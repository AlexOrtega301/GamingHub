<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css"> 
  <title id="page-title">¿De verdad tenías que hacer clic?</title>
</head>
<body>

<div style="margin-bottom:15px;">
    <label for="lang" id="lang-label">Idioma:</label>
    <select id="lang">
        <option value="es">Español</option>
        <option value="en">English</option>
        <option value="jp">日本語</option>
    </select>
</div>

  <h1 id="main-title">¿Por qué?</h1>
  
  <h2 id="sub-title">¿En realidad tenías que darle clic?</h2>
  
  <audio controls>
    <source src="Why.flac" type="audio/flac">
    <span id="audio-fallback">Tu navegador no soporta el elemento de audio.</span>
  </audio>

  <button onclick="goBack()" class="back-btn" id="back-btn">⬅ Volver</button>

<script>
function goBack() {
    window.location.href = "../index.html";
}

const translations = {
    es: {
        langLabel: "Idioma:",
        pageTitle: "¿De verdad tenías que hacer clic?",
        mainTitle: "¿Por qué?",
        subTitle: "¿En realidad tenías que darle clic?",
        audioFallback: "Tu navegador no soporta el elemento de audio.",
        back: "⬅ Volver"
    },
    en: {
        langLabel: "Language:",
        pageTitle: "Did you really have to click it?",
        mainTitle: "Why?",
        subTitle: "Did you really have to click it?",
        audioFallback: "Your browser does not support the audio element.",
        back: "⬅ Back"
    },
    jp: {
        langLabel: "言語:",
        pageTitle: "本当にクリックする必要がありましたか？",
        mainTitle: "なぜ？",
        subTitle: "本当にクリックする必要がありましたか？",
        audioFallback: "お使いのブラウザはオーディオ要素をサポートしていません。",
        back: "⬅ 戻る"
    }
};

document.getElementById("lang").addEventListener("change", function() {
    const lang = this.value;
    const t = translations[lang];

    document.documentElement.lang = lang;
    document.getElementById("lang-label").textContent = t.langLabel;
    document.getElementById("page-title").textContent = t.pageTitle;
    document.getElementById("main-title").textContent = t.mainTitle;
    document.getElementById("sub-title").textContent = t.subTitle;
    document.getElementById("audio-fallback").textContent = t.audioFallback;
    document.getElementById("back-btn").textContent = t.back;
    localStorage.setItem("language", lang);
});

document.addEventListener("DOMContentLoaded", () => {
    const selector = document.getElementById("lang");

    const savedLang = localStorage.getItem("language") || "es";

    selector.value = savedLang;
    applyLanguage(savedLang);

    selector.addEventListener("change", function() {
        applyLanguage(this.value);
    });
});
</script>

</body>
</html>
