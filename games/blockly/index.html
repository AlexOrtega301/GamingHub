<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="../../icon.webp">
    <link rel="stylesheet" href="style.css">
    <title id="page-title">Blockly IDE</title>
    <script type="module" src="https://unpkg.com/x-frame-bypass"></script>
    <script src="https://unpkg.com/@ungap/custom-elements-builtin"></script>
</head>
<body>

<div style="margin-bottom:15px;">
    <label for="lang" id="lang-label">Idioma:</label>
    <select id="lang">
        <option value="es">Español</option>
        <option value="en">English</option>
        <option value="jp">日本語</option>
    </select>
</div>

<h2 id="main-title">Blockly IDE</h2>
<h3 id="description">
Es necesario tener algunos conocimientos del lenguaje de programación de bloques (Blockly) para disfrutarlo al 100!
</h3>

<iframe 
    id="blockly-frame"
    is="x-frame-bypass"
    src="https://blockly-demo.appspot.com/static/demos/code/index.html?lang=es" 
    width="1000" 
    height="700" 
    style="border:none;">
</iframe>

<button onclick="goBack()" class="back-btn" id="back-btn">⬅ Volver</button>

<script>
function goBack() {
    window.location.href = "../../index.html";
}

const translations = {
    es: {
        langLabel: "Idioma:",
        title: "Blockly IDE",
        description: "Es necesario tener algunos conocimientos del lenguaje de programación de bloques (Blockly) para disfrutarlo al 100!",
        back: "⬅ Volver",
        iframeLang: "es"
    },
    en: {
        langLabel: "Language:",
        title: "Blockly IDE",
        description: "You need some knowledge of the block programming language (Blockly) to fully enjoy it!",
        back: "⬅ Back",
        iframeLang: "en"
    },
    jp: {
        langLabel: "言語:",
        title: "Blockly IDE",
        description: "最大限に楽しむには、Blocklyブロックプログラミングの基礎知識が必要です！",
        back: "⬅ 戻る",
        iframeLang: "ja"
    }
};

document.getElementById("lang").addEventListener("change", function() {
    const lang = this.value;
    const t = translations[lang];

    document.documentElement.lang = lang;
    document.getElementById("lang-label").textContent = t.langLabel;
    document.getElementById("main-title").textContent = t.title;
    document.getElementById("description").textContent = t.description;
    document.getElementById("back-btn").textContent = t.back;
    document.getElementById("page-title").textContent = t.title;

    document.getElementById("blockly-frame").src =
        "https://blockly-demo.appspot.com/static/demos/code/index.html?lang=" + t.iframeLang;
    localStorage.setItem("language", lang);
});

document.addEventListener("DOMContentLoaded", () => {
    const selector = document.getElementById("lang");

    const savedLang = localStorage.getItem("language") || "es";

    selector.value = savedLang;
    applyLanguage(savedLang);

    selector.addEventListener("change", function() {
        applyLanguage(this.value);
    });
});
</script>

</body>
</html>
