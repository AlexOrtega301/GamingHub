<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="../../icon.webp">
    <link rel="stylesheet" href="style.css">
    <title id="page-title">Google Snake!</title>
</head>
<body>

<div style="margin-bottom:15px;">
    <label for="lang" id="lang-label">Idioma:</label>
    <select id="lang">
        <option value="es">Español</option>
        <option value="en">English</option>
        <option value="jp">日本語</option>
        <option value="fr">Français</option>
    </select>
</div>

<h2 id="main-title">Google Snake con Mods!</h2>
<h3 id="description">
Un minijuego de snake, en el cual puedes elegir entre varios mods, como el Pudding y muchos más!
</h3>

<iframe 
    src="https://googlesnakemods.com/v/current/" 
    style="width:1000px;height:600px;border:none;" 
    frameborder="0" 
    scrolling="no">
</iframe>

<button onclick="goBack()" class="back-btn" id="back-btn">⬅ Volver</button>

<script>
function goBack() {
    window.location.href = "../../index.html";
}

const translations = {
    es: {
        langLabel: "Idioma:",
        title: "Google Snake con Mods!",
        description: "Un minijuego de snake, en el cual puedes elegir entre varios mods, como el Pudding y muchos más!",
        back: "⬅ Volver"
    },
    en: {
        langLabel: "Language:",
        title: "Google Snake with Mods!",
        description: "A mini Snake game where you can choose from various mods, like Pudding and many more!",
        back: "⬅ Back"
    },
    jp: {
        langLabel: "言語:",
        title: "Google Snake (モッド付き)",
        description: "さまざまなモッド（プディングなど）を選べるスネークのミニゲームです！",
        back: "⬅ 戻る"
    },
    fr: {
        langLabel: "Langue:",
        title: "Google Snake avec Mods !",
        description: "Un mini-jeu Snake où vous pouvez choisir parmi plusieurs mods, comme Pudding et bien d'autres !",
        back: "⬅ Retour"
    }
};

// 🔥 FUNCIÓN CENTRAL
function applyLanguage(lang) {
    const t = translations[lang];

    document.documentElement.lang = lang;
    document.getElementById("lang-label").textContent = t.langLabel;
    document.getElementById("main-title").textContent = t.title;
    document.getElementById("description").textContent = t.description;
    document.getElementById("back-btn").textContent = t.back;
    document.getElementById("page-title").textContent = t.title;

    localStorage.setItem("language", lang);
}

// 🚀 INIT
document.addEventListener("DOMContentLoaded", () => {
    const selector = document.getElementById("lang");

    const savedLang = localStorage.getItem("language") || "es";

    selector.value = savedLang;
    applyLanguage(savedLang);

    selector.addEventListener("change", function() {
        applyLanguage(this.value);
    });
});
</script>

</body>
</html>
