<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="../../icon.webp">
    <link rel="stylesheet" href="style.css">
    <title id="page-title">Incredibox Sprunki</title>
</head>
<body>

<div style="margin-bottom:15px;">
    <label for="lang" id="lang-label">Idioma:</label>
    <select id="lang">
        <option value="es">Español</option>
        <option value="en">English</option>
        <option value="jp">日本語</option>
        <option value="fr">Français</option>
    </select>
</div>

<h2 id="main-title">Incredibox Sprunki</h2>
<h3 id="description">
Un mod del juego Incredibox, donde creas música con personajes divertidos y coloridos, pero no todo es tan inocente.
</h3>

<iframe 
    src='https://www.minijuegos.mx/embed/incredibox-sprunki' 
    style='width:600px;height:400px;' 
    frameborder='0' 
    allowfullscreen>
</iframe>

<button onclick="goBack()" class="back-btn" id="back-btn">⬅ Volver</button>

<script>
function goBack() {
    window.location.href = "../../index.html";
}

const translations = {
    es: {
        langLabel: "Idioma:",
        title: "Incredibox Sprunki",
        description: "Un mod del juego Incredibox, donde creas música con personajes divertidos y coloridos, pero no todo es tan inocente.",
        back: "⬅ Volver"
    },
    en: {
        langLabel: "Language:",
        title: "Incredibox Sprunki",
        description: "A mod of the Incredibox game where you create music with fun and colorful characters, but not everything is as innocent as it seems!",
        back: "⬅ Back"
    },
    jp: {
        langLabel: "言語:",
        title: "Incredibox Sprunki",
        description: "カラフルで楽しいキャラクターで音楽を作るIncrediboxのMODですが、すべてが無邪気とは限りません。",
        back: "⬅ 戻る"
    },
    fr: {
        langLabel: "Langue:",
        title: "Incredibox Sprunki",
        description: "Un mod du jeu Incredibox où vous créez de la musique avec des personnages amusants et colorés, mais tout n'est pas aussi innocent qu'il y paraît !",
        back: "⬅ Retour"
    }
};

// 🔥 FUNCIÓN CENTRAL
function applyLanguage(lang) {
    const t = translations[lang];

    document.documentElement.lang = lang;
    document.getElementById("lang-label").textContent = t.langLabel;
    document.getElementById("main-title").textContent = t.title;
    document.getElementById("description").textContent = t.description;
    document.getElementById("back-btn").textContent = t.back;
    document.getElementById("page-title").textContent = t.title;

    localStorage.setItem("language", lang);
}

// 🚀 INIT
document.addEventListener("DOMContentLoaded", () => {
    const selector = document.getElementById("lang");

    const savedLang = localStorage.getItem("language") || "es";

    selector.value = savedLang;
    applyLanguage(savedLang);

    selector.addEventListener("change", function() {
        applyLanguage(this.value);
    });
});
</script>

</body>
</html>
