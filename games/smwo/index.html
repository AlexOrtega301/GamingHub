<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="../../icon.webp">
    <link rel="stylesheet" href="style.css">
    <title id="page-title">Super Mario World Online</title>
</head>
<body>

<div style="margin-bottom:15px;">
    <label for="lang" id="lang-label">Idioma:</label>
    <select id="lang">
        <option value="es">Español</option>
        <option value="en">English</option>
        <option value="jp">日本語</option>
        <option value="fr">Français</option>
    </select>
</div>

<h2 id="main-title">Super Mario World Online</h2>
<h3 id="description">
El mítico juego de la SNES totalmente gratis en tu navegador.
</h3>

<iframe src='https://www.minijuegos.mx/embed/super-mario-world-online' style='width: 800px;height: 600px;' frameborder='0' allowfullscreen></iframe>

<button onclick="goBack()" class="back-btn" id="back-btn">⬅ Volver</button>

<script>
function goBack() {
    window.location.href = "../../index.html";
}

const translations = {
    es: {
        langLabel: "Idioma:",
        title: "Super Mario World Online",
        description: "El mítico juego de la SNES totalmente gratis en tu navegador.",
        back: "⬅ Volver"
    },
    en: {
        langLabel: "Language:",
        title: "Super Mario World Online",
        description: "The legendary SNES game completely free in your browser.",
        back: "⬅ Back"
    },
    jp: {
        langLabel: "言語:",
        title: "スーパーマリオワールドオンライン",
        description: "伝説のSNESゲームがブラウザで完全無料で遊べます。",
        back: "⬅ 戻る"
    },
    fr: {
        langLabel: "Langue:",
        title: "Super Mario World Online",
        description: "Le jeu légendaire de la SNES entièrement gratuit dans votre navigateur.",
        back: "⬅ Retour"
    }
};

// 🔥 FUNCIÓN CENTRAL
function applyLanguage(lang) {
    const t = translations[lang];
    if (!t) return;

    document.documentElement.lang = lang;
    document.getElementById("lang-label").textContent = t.langLabel;
    document.getElementById("main-title").textContent = t.title;
    document.getElementById("description").textContent = t.description;
    document.getElementById("back-btn").textContent = t.back;
    document.getElementById("page-title").textContent = t.title;

    localStorage.setItem("language", lang);
}

// 🚀 INIT
document.addEventListener("DOMContentLoaded", () => {
    const selector = document.getElementById("lang");

    const savedLang = localStorage.getItem("language") || "es";

    selector.value = savedLang;
    applyLanguage(savedLang);

    selector.addEventListener("change", function() {
        applyLanguage(this.value);
    });
});
</script>

</body>
</html>
