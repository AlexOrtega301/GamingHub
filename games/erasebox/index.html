<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="../../icon.webp">
    <link rel="stylesheet" href="style.css">
    <title id="page-title">EraseBox</title>
</head>
<body>

<div style="margin-bottom:15px;">
    <label for="lang" id="lang-label">Idioma:</label>
    <select id="lang">
        <option value="es">Español</option>
        <option value="en">English</option>
        <option value="jp">日本語</option>
        <option value="fr">Français</option>
    </select>
</div>

<h2 id="main-title">EraseBox</h2>
<h3 id="description">
Un plataformero donde controlas un robot con cajas.
</h3>

<iframe src='https://19256.cache.armorgames.com/files/games/erase-box-19256/index.html?v=1653005419' style='width:600px;height:400px;' frameborder='0' allowfullscreen></iframe>

<button onclick="goBack()" class="back-btn" id="back-btn">⬅ Volver</button>

<script>
function goBack() {
    window.location.href = "../../index.html";
}

const translations = {
    es: {
        langLabel: "Idioma:",
        title: "EraseBox",
        description: "Un plataformero donde controlas un robot con cajas.",
        back: "⬅ Volver"
    },
    en: {
        langLabel: "Language:",
        title: "EraseBox",
        description: "A platformer where you control a robot with boxes.",
        back: "⬅ Back"
    },
    jp: {
        langLabel: "言語:",
        title: "EraseBox",
        description: "ボックスでロボットを操作するプラットフォーマー。",
        back: "⬅ 戻る"
    },
    fr: {
        langLabel: "Langue:",
        title: "EraseBox",
        description: "Un jeu de plateforme où vous contrôlez un robot avec des boîtes.",
        back: "⬅ Retour"
    }
};

// 🔥 FUNCIÓN CENTRAL
function applyLanguage(lang) {
    const t = translations[lang];

    document.documentElement.lang = lang;
    document.getElementById("lang-label").textContent = t.langLabel;
    document.getElementById("main-title").textContent = t.title;
    document.getElementById("description").textContent = t.description;
    document.getElementById("back-btn").textContent = t.back;
    document.getElementById("page-title").textContent = t.title;

    localStorage.setItem("language", lang);
}

// 🚀 INIT
document.addEventListener("DOMContentLoaded", () => {
    const selector = document.getElementById("lang");

    const savedLang = localStorage.getItem("language") || "es";

    selector.value = savedLang;
    applyLanguage(savedLang);

    selector.addEventListener("change", function() {
        applyLanguage(this.value);
    });
});
</script>

</body>
</html>
