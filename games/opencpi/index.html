<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="../../icon.webp">
    <link rel="stylesheet" href="style.css">
    <title id="page-title">OpenCPI</title>
</head>
<body>

<div style="margin-bottom:15px;">
    <label for="lang" id="lang-label">Idioma:</label>
    <select id="lang">
        <option value="es">Español</option>
        <option value="en">English</option>
        <option value="jp">日本語</option>
        <option value="fr">Français</option>
    </select>
</div>

<h2 id="main-title">OpenCPI</h2>
<h4 id="description">
Llamando a todos los cazadores de tesoros, buscadores de estilo, pingüinos fiesteros, amantes de la comida, mariposas sociales, estrellas de rock y exploradores. Encontrarán las aventuras de toda una vida en Club Penguin Island, remendada y actualizada a Unity 6.3.
</h4>

<iframe src="https://opencpisland.github.io/play" style="width:1000px;height:600px;border:none;" frameborder="0" scrolling="no"></iframe>

<button onclick="goBack()" class="back-btn" id="back-btn">⬅ Volver</button>

<script>
function goBack() {
    window.location.href = "../../index.html";
}

const translations = {
    es: {
        langLabel: "Idioma:",
        pageTitle: "OpenCPI",
        mainTitle: "OpenCPI",
        description: "Llamando a todos los cazadores de tesoros, buscadores de estilo, pingüinos fiesteros, amantes de la comida, mariposas sociales, estrellas de rock y exploradores. Encontrarán las aventuras de toda una vida en Club Penguin Island, remendada y actualizada a Unity 6.3.",
        back: "⬅ Volver"
    },
    en: {
        langLabel: "Language:",
        pageTitle: "OpenCPI",
        mainTitle: "OpenCPI",
        description: "Calling all treasure hunters, style seekers, party penguins, food lovers, social butterflies, rock stars and explorers. You will find the adventure of a lifetime on Club Penguin Island, patched and upgraded to Unity 6.3.",
        back: "⬅ Back"
    },
    jp: {
        langLabel: "言語:",
        pageTitle: "OpenCPI",
        mainTitle: "OpenCPI",
        description: "宝探し、スタイル探求者、パーティーペンギン、グルメ、社交家、ロックスター、探検家の皆さんへ。Unity 6.3に更新されたClub Penguin Islandで、一生に一度の冒険が待っています。",
        back: "⬅ 戻る"
    },
    fr: {
        langLabel: "Langue:",
        pageTitle: "OpenCPI",
        mainTitle: "OpenCPI",
        description: "Avis à tous les chasseurs de trésors, amateurs de style, pingouins fêtards, gourmands, papillons sociaux, rock stars et explorateurs. Vous trouverez l'aventure d'une vie sur Club Penguin Island, corrigé et mis à jour vers Unity 6.3.",
        back: "⬅ Retour"
    }
};

// 🔥 FUNCIÓN CENTRAL
function applyLanguage(lang) {
    const t = translations[lang];

    document.documentElement.lang = lang;
    document.getElementById("lang-label").textContent = t.langLabel;
    document.getElementById("page-title").textContent = t.pageTitle;
    document.getElementById("main-title").textContent = t.mainTitle;
    document.getElementById("description").textContent = t.description;
    document.getElementById("back-btn").textContent = t.back;

    localStorage.setItem("language", lang);
}

// 🚀 INIT
document.addEventListener("DOMContentLoaded", () => {
    const selector = document.getElementById("lang");

    const savedLang = localStorage.getItem("language") || "es";

    selector.value = savedLang;
    applyLanguage(savedLang);

    selector.addEventListener("change", function() {
        applyLanguage(this.value);
    });
});
</script>

</body>
</html>
