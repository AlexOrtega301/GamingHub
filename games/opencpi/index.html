<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="../../icon.webp">
    <link rel="stylesheet" href="style.css">
    <title id="page-title">OpenCPI</title>
</head>
<body>

<div style="margin-bottom:15px;">
    <label for="lang" id="lang-label">Idioma:</label>
    <select id="lang">
        <option value="es">Español</option>
        <option value="en">English</option>
        <option value="jp">日本語</option>
    </select>
</div>

<h2 id="main-title">OpenCPI</h2>
<h4 id="description"> Llamando a todos los cazadores de tesoros, buscadores de estilo, pingüinos fiesteros, amantes de la comida, mariposas sociales, estrellas de rock y exploradores. Encontrarán las aventuras de toda una vida en Club Penguin Island, remendada y actualizada a Unity 6.3.</h4>

<iframe src="https://opencpisland.github.io/play" style="width:1000px;height:600px;border:none;" frameborder="0" scrolling="no"></iframe>

<button onclick="goBack()" class="back-btn" id="back-btn">⬅ Volver</button>

<script>
function goBack() {
    window.location.href = "../../index.html";
}

const translations = {
    es: {
        langLabel: "Idioma:",
        pageTitle: "OpenCPI",
        mainTitle: "OpenCPI",
        hostInfo: "Este juego esta hosteado en nuestro sitio!",
        description: "Llamando a todos los cazadores de tesoros, buscadores de estilo, pingüinos fiesteros, amantes de la comida, mariposas sociales, estrellas de rock y exploradores. Encontrarán las aventuras de toda una vida en Club Penguin Island, remendada y actualizada a Unity 6.3.",
        back: "⬅ Volver"
    },
    en: {
        langLabel: "Language:",
        pageTitle: "OpenCPI",
        mainTitle: "OpenCPI",
        hostInfo: "This game is hosted on our site!",
        description: "Calling all treasure hunters, style seekers, party penguins, foodies, social butterflies, rock stars and explorers. You will find the adventures of a lifetime on Club Penguin Island, patched up and upgraded to Unity 6.3.",
        back: "⬅ Back"
    },
    jp: {
        langLabel: "言語:",
        pageTitle: "OpenCPI",
        mainTitle: "OpenCPI",
        hostInfo: "このゲームは当サイトでホストされています！",
        description: "すべての宝探し、スタイルシーカー、パーティーペンギン、フーディー、社交的な蝶、ロックスター、探検家を呼び出します。あなたは、Unity 6.3にパッチが当てられ、アップグレードされたClub Penguin Islandで一生の冒険を見つけるでしょう。",
        back: "⬅ 戻る"
    }
};

function applyLanguage(lang) {
    const t = translations[lang];

    document.documentElement.lang = lang;
    document.getElementById("lang-label").textContent = t.langLabel;
    document.getElementById("page-title").textContent = t.pageTitle;
    document.getElementById("main-title").textContent = t.mainTitle;
    document.getElementById("host-info").textContent = t.hostInfo;
    document.getElementById("description").textContent = t.description;
    document.getElementById("back-btn").textContent = t.back;
}

document.addEventListener("DOMContentLoaded", () => {
    const selector = document.getElementById("lang");

    const savedLang = localStorage.getItem("language") || "es";

    selector.value = savedLang;
    applyLanguage(savedLang);

    selector.addEventListener("change", function() {
        applyLanguage(this.value);
        localStorage.setItem("language", this.value);
    });
});
</script>


</body>
</html>
