<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="../icon.webp">
    <link rel="stylesheet" href="style.css">
    <title id="page-title">Win7Simu</title>
    <script type="module" src="https://unpkg.com/x-frame-bypass"></script>
    <script src="https://unpkg.com/@ungap/custom-elements-builtin"></script>
</head>
<body>

<div style="margin-bottom:15px;">
    <label for="lang" id="lang-label">Idioma:</label>
    <select id="lang">
        <option value="es">Español</option>
        <option value="en">English</option>
        <option value="jp">日本語</option>
    </select>
</div>

<h2 id="main-title">Win7Simu</h2>

<iframe 
    is="x-frame-bypass"
    src="https://win7simu.visnalize.com/" 
    width="1000" 
    height="700" 
    style="border:none;">
</iframe>

<button onclick="goBack()" class="back-btn" id="back-btn">⬅ Volver</button>

<script>
function goBack() {
    window.location.href = "../../index.html";
}

const translations = {
    es: {
        langLabel: "Idioma:",
        pageTitle: "Win7Simu",
        mainTitle: "Win7Simu",
        back: "⬅ Volver"
    },
    en: {
        langLabel: "Language:",
        pageTitle: "Win7Simu",
        mainTitle: "Win7Simu",
        back: "⬅ Back"
    },
    jp: {
        langLabel: "言語:",
        pageTitle: "Win7Simu",
        mainTitle: "Win7Simu",
        back: "⬅ 戻る"
    }
};

document.getElementById("lang").addEventListener("change", function() {
    const lang = this.value;
    const t = translations[lang];

    document.documentElement.lang = lang;
    document.getElementById("lang-label").textContent = t.langLabel;
    document.getElementById("page-title").textContent = t.pageTitle;
    document.getElementById("main-title").textContent = t.mainTitle;
    document.getElementById("back-btn").textContent = t.back;
    localStorage.setItem("language", lang);
});
document.addEventListener("DOMContentLoaded", () => {
    const savedLang = localStorage.getItem("language") || "es";
    applyLanguage(savedLang);
});
</script>

</body>
</html>
