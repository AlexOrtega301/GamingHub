<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="../icon.webp">
    <link rel="stylesheet" href="style.css">
    <title id="page-title">ParaSprunki</title>
</head>
<body>

<div style="margin-bottom:15px;">
    <label for="lang" id="lang-label">Idioma:</label>
    <select id="lang">
        <option value="es">Español</option>
        <option value="en">English</option>
        <option value="jp">日本語</option>
    </select>
</div>

<h2 id="main-title">ParaSprunki</h2>

<iframe 
    id="iframe-cocrea"
    width="336"
    height="286"
    src="https://cocrea.world/embed/1847901299876610049?type=card&showCreator=true&showOperating=true"
    title="ParaSprunki - Scratch project hosted on Cocrea"
    frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    allowfullscreen>
</iframe>

<button onclick="goBack()" class="back-btn" id="back-btn">⬅ Volver</button>

<script>
function goBack() {
    window.location.href = "../../index.html";
}

const translations = {
    es: {
        langLabel: "Idioma:",
        pageTitle: "ParaSprunki",
        mainTitle: "ParaSprunki",
        back: "⬅ Volver"
    },
    en: {
        langLabel: "Language:",
        pageTitle: "ParaSprunki",
        mainTitle: "ParaSprunki",
        back: "⬅ Back"
    },
    jp: {
        langLabel: "言語:",
        pageTitle: "ParaSprunki",
        mainTitle: "ParaSprunki",
        back: "⬅ 戻る"
    }
};

document.getElementById("lang").addEventListener("change", function() {
    const lang = this.value;
    const t = translations[lang];

    document.documentElement.lang = lang;
    document.getElementById("lang-label").textContent = t.langLabel;
    document.getElementById("page-title").textContent = t.pageTitle;
    document.getElementById("main-title").textContent = t.mainTitle;
    document.getElementById("back-btn").textContent = t.back;
    localStorage.setItem("language", lang);
});

document.addEventListener("DOMContentLoaded", () => {
    const selector = document.getElementById("lang");

    const savedLang = localStorage.getItem("language") || "es";

    selector.value = savedLang;
    applyLanguage(savedLang);

    selector.addEventListener("change", function() {
        applyLanguage(this.value);
    });
});
</script>

</body>
</html>
