<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="../icon.webp">
    <link rel="stylesheet" href="style.css">
    <title id="page-title">Count Masters: Stickman Games</title>
</head>
<body>

<div style="margin-bottom:15px;">
    <label for="lang" id="lang-label">Idioma:</label>
    <select id="lang">
        <option value="es">Español</option>
        <option value="en">English</option>
        <option value="jp">日本語</option>
        <option value="fr">Français</option>
    </select>
</div>

<h2 id="main-title">Count Masters: Stickman Games</h2>

<iframe 
    src="https://games.crazygames.com/en_US/count-masters-stickman-games/index.html"
    width="740"
    height="480"
    frameborder="0"
    allowfullscreen="true"
    title="CrazyGames - count masters stickman games"
    sandbox="allow-scripts allow-same-origin allow-forms allow-presentation allow-gamepad">
</iframe>

<button onclick="goBack()" class="back-btn" id="back-btn">⬅ Volver</button>

<script>
function goBack() {
    window.location.href = "../../index.html";
}

const translations = {
    es: {
        langLabel: "Idioma:",
        pageTitle: "Count Masters: Stickman Games",
        mainTitle: "Count Masters: Stickman Games",
        back: "⬅ Volver"
    },
    en: {
        langLabel: "Language:",
        pageTitle: "Count Masters: Stickman Games",
        mainTitle: "Count Masters: Stickman Games",
        back: "⬅ Back"
    },
    jp: {
        langLabel: "言語:",
        pageTitle: "Count Masters: Stickman Games",
        mainTitle: "Count Masters: Stickman Games",
        back: "⬅ 戻る"
    },
    fr: {
        langLabel: "Langue:",
        pageTitle: "Count Masters: Stickman Games",
        mainTitle: "Count Masters: Stickman Games",
        back: "⬅ Retour"
    }
};

// 🔥 FUNCIÓN CENTRAL
function applyLanguage(lang) {
    const t = translations[lang];
    if (!t) return;

    document.documentElement.lang = lang;
    document.getElementById("lang-label").textContent = t.langLabel;
    document.getElementById("page-title").textContent = t.pageTitle;
    document.getElementById("main-title").textContent = t.mainTitle;
    document.getElementById("back-btn").textContent = t.back;

    localStorage.setItem("language", lang);
}

// 🚀 INIT
document.addEventListener("DOMContentLoaded", () => {
    const selector = document.getElementById("lang");

    const savedLang = localStorage.getItem("language") || "es";

    selector.value = savedLang;
    applyLanguage(savedLang);

    selector.addEventListener("change", function() {
        applyLanguage(this.value);
    });
});
</script>

</body>
</html>
