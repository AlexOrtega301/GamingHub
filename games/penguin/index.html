<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="../../icon.webp">
    <link rel="stylesheet" href="style.css">
    <title id="page-title">Club Penguin Atake</title>
</head>
<body>

<div style="margin-bottom:15px;">
    <label for="lang" id="lang-label">Idioma:</label>
    <select id="lang">
        <option value="es">Español</option>
        <option value="en">English</option>
        <option value="jp">日本語</option>
    </select>
</div>

<h2 id="main-title">Club Penguin Atake</h2>
<h3 id="warning-text">No funcionará si no tienes una cuenta en Club Penguin Atake!</h3>

<a href="https://id.live.net.co/v1/register/cpa" target="_blank" class="external-link">
    <h4 id="register-text">Crea una cuenta en Club Penguin Atake!</h4>
</a>

<iframe 
    src="https://app.cpatake.boo/" 
    width="1000" 
    height="700" 
    style="border:none;">
</iframe>

<button onclick="goBack()" class="back-btn" id="back-btn">⬅ Volver</button>

<script>
function goBack() {
    window.location.href = "../../index.html";
}

const translations = {
    es: {
        langLabel: "Idioma:",
        pageTitle: "Club Penguin Atake",
        mainTitle: "Club Penguin Atake",
        warning: "No funcionará si no tienes una cuenta en Club Penguin Atake!",
        register: "Crea una cuenta en Club Penguin Atake!",
        back: "⬅ Volver"
    },
    en: {
        langLabel: "Language:",
        pageTitle: "Club Penguin Atake",
        mainTitle: "Club Penguin Atake",
        warning: "It will not work if you do not have a Club Penguin Atake account!",
        register: "Create a Club Penguin Atake account!",
        back: "⬅ Back"
    },
    jp: {
        langLabel: "言語:",
        pageTitle: "Club Penguin Atake",
        mainTitle: "Club Penguin Atake",
        warning: "Club Penguin Atakeのアカウントがないと動作しません！",
        register: "Club Penguin Atakeのアカウントを作成する！",
        back: "⬅ 戻る"
    }
};

document.getElementById("lang").addEventListener("change", function() {
    const lang = this.value;
    const t = translations[lang];

    document.documentElement.lang = lang;
    document.getElementById("lang-label").textContent = t.langLabel;
    document.getElementById("page-title").textContent = t.pageTitle;
    document.getElementById("main-title").textContent = t.mainTitle;
    document.getElementById("warning-text").textContent = t.warning;
    document.getElementById("register-text").textContent = t.register;
    document.getElementById("back-btn").textContent = t.back;
    localStorage.setItem("language", lang);
});
document.addEventListener("DOMContentLoaded", () => {
    const selector = document.getElementById("lang");

    const savedLang = localStorage.getItem("language") || "es";

    selector.value = savedLang;
    applyLanguage(savedLang);

    selector.addEventListener("change", function() {
        applyLanguage(this.value);
    });
});
</script>

</body>
</html>
